# remap prefix to ctrl-a to not hate myself
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# mouse support
set -g mouse on

# vi mode
setw -g mode-keys vi
bind -T copy-mode-vi '#' send -X search-backward "#{copy_cursor_word}"
bind -T copy-mode-vi '*' send -X search-forward "#{copy_cursor_word}"
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"

# tmux plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @open 'x'

# copy-mode gx: open thing under cursor (url/domain/file)
bind -T copy-mode-vi g switch-client -T copy-mode-g
bind -T copy-mode-g g send -X history-top
bind -T copy-mode-g x run-shell -b "[ -x \"$HOME/bin/tmux-open-under-cursor\" ] && \"$HOME/bin/tmux-open-under-cursor\" #{q:copy_cursor_line} #{copy_cursor_x} #{q:copy_cursor_word} #{q:copy_cursor_hyperlink} #{q:pane_current_path} #{pane_id} || tmux display-message -t #{pane_id} 'missing ~/bin/tmux-open-under-cursor (run install.sh scripts step)'"

# match vim style splits, open in current path
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"

# vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# jump to previous window (like vim ctrl-^)
bind ^ last-window

# pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# start numbering at 1
set -g base-index 1
setw -g pane-base-index 1

# name windows after cwd
set -g automatic-rename on
set -g automatic-rename-format '#{b:pane_current_path}'

# faster escape (for vim)
set -sg escape-time 10

# more history
set -g history-limit 10000

# reload config
bind r source-file ~/.tmux.conf \; display "reloaded"

# --- claude code notification support ---

# bell monitoring: highlight windows that need attention
set -g monitor-bell on
set -g bell-action other
set -g visual-bell off

# window status styling
set -g window-status-bell-style 'fg=black bg=yellow bold'

# show notification icon+text in non-focused window tabs
set -g window-status-format '#I:#W#{?#{@notify_msg}, [#{@notify_icon} #{@notify_msg}],}'
set -g window-status-current-format '#I:#W#F'

# status-right: show current window's notification (if any) + defaults
set -g status-right-length 100
set -g status-right '#{?#{@notify_msg},#{@notify_icon} #{@notify_time} #{@notify_msg} | ,}"#{=21:pane_title}" %H:%M %d-%b-%y'

# allow passthrough for escape sequences
set -g allow-passthrough on

# load tpm if installed
if-shell '[ -f "$HOME/.tmux/plugins/tpm/tpm" ]' 'run-shell "$HOME/.tmux/plugins/tpm/tpm"'
